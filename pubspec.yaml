name: autolab_students
description: AutoLab Student Flutter App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2
  get: ^4.6.6

  # Networking
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # JSON serialization
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # QR scanner
  mobile_scanner: ^5.2.3

  # URL launcher
  url_launcher: ^6.3.0

  # Intl for dates, etc.
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true


